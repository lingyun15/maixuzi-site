<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>私人别墅方案在线预览</title>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #111; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #app { width: 100%; height: 100%; }
    .panel {
      position: fixed; left: 14px; top: 14px; z-index: 10;
      width: 310px; max-width: calc(100vw - 28px);
      color: #fff; background: rgba(0,0,0,.62); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.12); border-radius: 12px; padding: 12px 14px;
      box-shadow: 0 12px 30px rgba(0,0,0,.28);
    }
    .panel h1 { margin: 0 0 8px; font-size: 16px; }
    .panel p { margin: 5px 0; color: #ddd; font-size: 13px; line-height: 1.55; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    button {
      border: 1px solid rgba(255,255,255,.18); background: rgba(255,255,255,.1); color: #fff;
      border-radius: 8px; padding: 7px 9px; cursor: pointer; font-size: 12px;
    }
    button:hover { background: rgba(255,255,255,.18); }
    .hint { position: fixed; right: 14px; bottom: 14px; z-index: 10; color: #eee; font-size: 12px; background: rgba(0,0,0,.55); padding: 9px 11px; border-radius: 10px; }
    .error { color: #ffb4b4 !important; }
    .ok { color: #b8ffcb !important; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="panel">
    <h1>私人别墅方案在线预览</h1>
    <p id="status">正在加载 <code>models/model.obj.gz</code> ...</p>
    <p>操作：鼠标左键旋转，右键平移，滚轮缩放。适合低配电脑查看 SU 导出的 OBJ 空间模型。</p>
    <div class="row">
      <button data-view="front">正面</button>
      <button data-view="back">背面</button>
      <button data-view="left">左侧</button>
      <button data-view="right">右侧</button>
      <button data-view="top">俯视</button>
      <button data-view="inside">室内视角</button>
      <button id="fit">适配模型</button>
    </div>
  </div>
  <div class="hint">私人别墅模型预览：这是在线模型漫游，不是照片级渲染全景</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./viewer.js"></script>
</body>
</html>
